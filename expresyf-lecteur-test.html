<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Player vidéo</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: black;
  }
  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
</style>
</head>
<body>

<video id="video" controls
       controlsList="nodownload noremoteplayback"
       disablePictureInPicture
       playsinline>
  <source src="https://sharedocs.huma-num.fr/wl/?id=jaVo31BBR3h2LeSDiGuOX4yIBwknsSef&fmode=open" type="video/mp4">
  Votre navigateur ne supporte pas la lecture vidéo.
</video>

<script>
// Bloquer clic droit sur la vidéo
document.addEventListener("contextmenu", event => event.preventDefault());
</script>

</body>
</html>
